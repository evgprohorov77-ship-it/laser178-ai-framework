id: guarantees
version: "1.0.0"
owner_portal: true
source: owner_edited

# Редактирует только Owner. После изменения запустить синхронизацию.
# Юридически значимые условия — только после согласования с юристом/владельцем.

guarantees:
  - type: workmanship
    title: "Гарантия на выполненные антикоррозийные работы"
    duration: "до 5 лет"
    public: true
    conditions:
      - value: "Регулярная мойка автомобиля."
        public: true
      - value: "Отсутствие ДТП и механических повреждений в обработанных зонах."
        public: true
      - value: "Своевременный контрольный осмотр."
        public: true

  - type: corrosion_free
    title: "Гарантия от сквозной коррозии на обработанных участках"
    duration: "до 5 лет"
    public: true
    conditions:
      - value: "Обработка выполнена полным комплексом согласно технологии."
        public: true
      - value: "Автомобиль не подвергался аварийному повреждению ЛКП в обработанных зонах."
        public: true

exclusions:
  - value: "Поверхностная ржавчина, возникшая в результате механических повреждений или нарушения условий эксплуатации."
    public: true
  - value: "Узлы и агрегаты, не входившие в перечень работ по договору."
    public: true

notes:
  - "Точные условия гарантии требуют юридического согласования."
  - "Срок 'до 5 лет' — публичный, но требует уточнения для каждого вида работ."
